name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload frontend source bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-source
          path: frontend

      - name: Upload backend source bundle
        uses: actions/upload-artifact@v4
        with:
          name: backend-source
          path: backend

      - name: Upload contracts source bundle
        uses: actions/upload-artifact@v4
        with:
          name: contracts-source
          path: contracts

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release archive
        run: tar -czf agentro-release-${GITHUB_REF_NAME}.tar.gz -C release-artifacts .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: agentro-release-${{ github.ref_name }}.tar.gz
