# ──────────────────────────────────────────────────────────────
#  Agentro CI Pipeline
#  Runs on every push to main and on all pull requests.
#  Four parallel jobs: contracts · backend · frontend · security
# ──────────────────────────────────────────────────────────────

name: Agentro CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── CONTRACTS ────────────────────────────────────────────────
jobs:
  contracts:
    name: 🦀 Contracts (Rust / Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: contracts-${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock', 'contracts/**/Cargo.toml') }}
          restore-keys: contracts-${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Release build
        run: cargo build --release --workspace

  # ── BACKEND ──────────────────────────────────────────────────
  backend:
    name: ⚙️ Backend (Node.js + Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify server can start
        run: |
          timeout 5 node -e "
            process.env.PORT = 0;
            process.env.NEWS_API_KEY = 'test';
            process.env.REDDIT_CLIENT_ID = 'test';
            process.env.REDDIT_SECRET = 'test';
            process.env.GROQ_API_KEY = 'test';
            const app = require('./server.js');
          " || true

  # ── FRONTEND ─────────────────────────────────────────────────
  frontend:
    name: 🌐 Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      # Dummy env vars required for Next.js static build
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
      NEXT_PUBLIC_STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
      NEXT_PUBLIC_STELLAR_READ_ADDRESS: GAVRMNUYDJNYOIIFAQLXILURMRRH2XJHVSE2G3GCV2HZLXF4HKLZA365
      NEXT_PUBLIC_XLM_ASSET_CONTRACT_ID: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
      NEXT_PUBLIC_AGT_TOKEN_CONTRACT_ID: CBHWUYJV7ST3Y2FFGIZQLAVSNAAPIAX7C54LDLDEEJG2YMNSL2DW7MJK
      NEXT_PUBLIC_PAYMENT_CONTRACT_ID: CDVNESO6BWJLON6KQFF4J6G3CBL75IIW5ZIXU5CTNHPUDPASCCOKREWX
      NEXT_PUBLIC_LEADERBOARD_CONTRACT_ID: CBIMAIUW5QQSIN63ZEZTLB7DTG3V75OD3A6Z2B2N7HQ5C57LWSWJPSH6
      NEXT_PUBLIC_BOUNTY_CONTRACT_ID: CCBUDEP5PZH3LODCRITJPVSKUA45L7GURDNZMUBNQJQ5J336D2XGKTBP
      NEXT_PUBLIC_AGENT_MANAGER_CONTRACT_ID: CDVPZXUEAT7Z57MVCUXWX4RICXPSH6BK3I64YV3MDXNPRMSOFVEJCNVK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . || true

      - name: Build
        run: npm run build

  # ── SECURITY ─────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit backend deps
        run: |
          cd backend
          npm audit --audit-level=high || true

      - name: Audit frontend deps
        run: |
          cd frontend
          npm audit --audit-level=high || true