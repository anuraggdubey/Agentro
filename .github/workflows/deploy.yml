# ──────────────────────────────────────────────────────────────
#  Agentro Deploy Workflow
#  Manual trigger (workflow_dispatch) for production deploys.
#  Customize the deploy steps for your hosting provider.
# ──────────────────────────────────────────────────────────────

name: Agentro Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  # ── RUN CI FIRST ─────────────────────────────────────────────
  ci:
    name: ✅ Run CI checks
    uses: ./.github/workflows/ci.yml

  # ── DEPLOY CONTRACTS ─────────────────────────────────────────
  deploy-contracts:
    name: 🦀 Deploy Contracts
    needs: ci
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release WASM
        run: |
          cd contracts
          cargo build --release --workspace

      - name: Deploy contracts to Stellar
        run: |
          echo "🚀 Contract deployment step"
          echo "Configure this step with your Stellar CLI and deployment keys."
          echo "Example: stellar contract deploy --wasm <path> --network ${{ github.event.inputs.environment }}"
          echo "⚠️ Add STELLAR_SECRET_KEY to GitHub Secrets before enabling."

  # ── DEPLOY BACKEND ───────────────────────────────────────────
  deploy-backend:
    name: ⚙️ Deploy Backend
    needs: ci
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd backend
          npm ci --omit=dev

      - name: Deploy backend
        run: |
          echo "🚀 Backend deployment step"
          echo "Configure this for your hosting provider (Railway, Render, EC2, etc.)"
          echo "Example for Railway: railway up --service backend"
          echo "⚠️ Add hosting provider API keys to GitHub Secrets."

  # ── DEPLOY FRONTEND ──────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend
    needs: ci
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STELLAR_NETWORK: ${{ secrets.NEXT_PUBLIC_STELLAR_NETWORK }}
          NEXT_PUBLIC_STELLAR_RPC_URL: ${{ secrets.NEXT_PUBLIC_STELLAR_RPC_URL }}
          NEXT_PUBLIC_STELLAR_NETWORK_PASSPHRASE: ${{ secrets.NEXT_PUBLIC_STELLAR_NETWORK_PASSPHRASE }}
          NEXT_PUBLIC_STELLAR_READ_ADDRESS: ${{ secrets.NEXT_PUBLIC_STELLAR_READ_ADDRESS }}
          NEXT_PUBLIC_XLM_ASSET_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_XLM_ASSET_CONTRACT_ID }}
          NEXT_PUBLIC_AGT_TOKEN_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_AGT_TOKEN_CONTRACT_ID }}
          NEXT_PUBLIC_PAYMENT_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_PAYMENT_CONTRACT_ID }}
          NEXT_PUBLIC_LEADERBOARD_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_LEADERBOARD_CONTRACT_ID }}
          NEXT_PUBLIC_BOUNTY_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_BOUNTY_CONTRACT_ID }}
          NEXT_PUBLIC_AGENT_MANAGER_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_AGENT_MANAGER_CONTRACT_ID }}
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy frontend
        run: |
          echo "🚀 Frontend deployment step"
          echo "Configure this for Vercel, Netlify, Cloudflare Pages, etc."
          echo "Example for Vercel: npx vercel --prod --token=$VERCEL_TOKEN"
          echo "⚠️ Add VERCEL_TOKEN (or equivalent) to GitHub Secrets."
